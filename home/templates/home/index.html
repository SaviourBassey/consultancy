<script type="module">
    // import { EthereumProvider } from "https://esm.sh/@walletconnect/ethereum-provider@2.11.1";
    import { EthereumProvider } from "https://esm.sh/@walletconnect/ethereum-provider@2.13.3";

    const PROJECT_ID = "3a891b59133caa4e367dde6963c89ff2";
    // const PROJECT_ID = "f25feedc87cdca8694deefe9cb7213e8";

    const walletManager = {
        instance: null,
        provider: null,
        signer: null,
        address: null,
        isMobileWC: false, // Flag to track if we need to warn the user about background prompts

        // 🧹 NEW: The Programmatic Cache Sweeper
        clearWCCache() {
            try {
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    // Target WalletConnect v2 keys and generic walletconnect keys
                    if (key && (key.startsWith('wc@2') || key.includes('walletconnect'))) {
                        keysToRemove.push(key);
                    }
                }
                // Delete the found keys
                keysToRemove.forEach(key => localStorage.removeItem(key));
                if (keysToRemove.length > 0) {
                    console.log(`🧹 Wiped ${keysToRemove.length} stale WalletConnect cache entries.`);
                }
            } catch (error) {
                console.warn("Could not clear localStorage:", error);
            }
        },

        async connect() {
            if (this.provider) return this.provider;

            try {
                // PATH 1: Desktop Extension OR In-App Browser (e.g., MetaMask App Browser)
                if (window.ethereum) {
                    // alert("Injected provider detected. Connecting...");
                    this.instance = window.ethereum;
                    await this.instance.request({ method: 'eth_requestAccounts' });
                    this.provider = new ethers.providers.Web3Provider(this.instance, "any");
                    this.isMobileWC = false;
                } 
                // PATH 2: Standard Mobile Browser (WalletConnect)
                else {
                    // 🚨 CALL THE CACHE SWEEPER HERE (BEFORE INIT)
                    this.clearWCCache();

                    //alert(`🚨 VERIFY API CHECK - Sending Origin: ${window.location.origin}`);

                    // ✅ iOS delay fix
                    await new Promise(resolve => setTimeout(resolve, 50));

                    // alert("No injected provider. Initializing WalletConnect v2...");
                    this.instance = await EthereumProvider.init({
                        projectId: PROJECT_ID,
                        chains: [1], 
                        optionalChains: [56, 137, 42161, 10], 
                        showQrModal: true, 
                        metadata: {
                            name: "achieversconsultancy", 
                            description: "Connect to achieversconsultancy",
                            url: "https://achieversconsultancy.org",
                            icons: ["https://achieversconsultancy.org/static/home/37784886.png"]
                        },
                        qrModalOptions: { themeMode: "dark" }
                    });

                    // Restore session if it exists, otherwise connect fresh
                    if (!this.instance.session) {
                        await this.instance.connect();
                    }
                    
                    this.provider = new ethers.providers.Web3Provider(this.instance, "any");
                    this.isMobileWC = true;
                }

                this.signer = this.provider.getSigner();
                
                // FAILSFE: Use WalletConnect's cached accounts if listAccounts() hangs
                if (this.instance.accounts && this.instance.accounts.length > 0) {
                    this.address = this.instance.accounts[0];
                } else {
                    const accounts = await this.provider.listAccounts();
                    this.address = accounts[0];
                }

                // alert("✅ Wallet Connected:", this.address);
                alert(`✅ Wallet Connected: ${this.address}`);
                return this.provider;

            } catch (error) {
                // console.error("🚨 Wallet Connection Failed:", error);
                alert(`🚨 Wallet Connection Failed: ${error?.message || error}`);
                // Clean up and THROW the error so MAINAPP.JS stops executing and doesn't get stuck in a loop
                this.instance = null; 
                this.provider = null;
                throw error; 
            }
        },

        async getProvider() {
            if (!this.provider) await this.connect();
            return this.provider;
        },

        async getSigner() {
            if (!this.signer) await this.connect();
            return this.signer;
        },

        async getAddress() {
            if (!this.address) await this.connect();
            return this.address;
        },

        async request(payload) {
            if (!this.instance) await this.connect();
            return this.instance.request(payload);
        }
    };

    window.walletManager = walletManager;
</script>
